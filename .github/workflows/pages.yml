name: Deploy dashboard to GitHub Pages

# Publishes the repo (static dashboard + committed CSV data) to GitHub Pages.
# Runs on every push to main, after the daily crawl commits new data, and
# can be triggered by hand from the Actions tab.
#
# One-time setup required: repo Settings -> Pages -> Build and deployment ->
# Source = "GitHub Actions". After that this workflow fully manages deploys.

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Re-deploy after the crawl/weekly jobs commit fresh data to main. Pushes made
  # by the Actions bot token don't trigger `push` workflows, so without this the
  # public site would stay frozen at the last human push. workflow_run fires on
  # the completion of those workflows regardless of who pushed.
  workflow_run:
    workflows: ["mein-now course crawl", "weekly course ranking report"]
    types: [completed]
    branches: [main]

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # On a workflow_run trigger, only publish if the crawl actually succeeded;
    # push / manual dispatch always publish.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build type = GitHub Actions) so no manual
          # Settings -> Pages step is needed.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo so index.html can fetch meinnow_crawler/data/*.csv
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
